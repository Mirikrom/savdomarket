# Barcha ${...} qiymatlar loyiha ildizidagi .env dan o'qiladi (cp .env.example .env)
services:
  db:
    image: postgres:16
    container_name: savdopro-db
    environment:
      POSTGRES_DB: ${DB_NAME:-savdopro}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PUBLISH_PORT:-54311}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-savdopro}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: savdopro-backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PUBLISH_PORT:-8011}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: savdopro-frontend
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PUBLISH_PORT:-51711}:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
